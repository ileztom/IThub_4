server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        # ── Auth & User Service ──────────────────────────────────────────────
        - id: user-service-auth
          uri: ${USER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=0

        - id: user-service
          uri: ${USER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/users/**
          filters:
            - StripPrefix=0
            - JwtAuthFilter

        # ── Catalog Service ──────────────────────────────────────────────────
        - id: catalog-service
          uri: ${CATALOG_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/books/**
          filters:
            - StripPrefix=0
            - JwtAuthFilter

        # ── Loan Service ─────────────────────────────────────────────────────
        - id: loan-service
          uri: ${LOAN_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/loans/**
          filters:
            - StripPrefix=0
            - JwtAuthFilter

        # ── Notification Service ──────────────────────────────────────────────
        - id: notification-service
          uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/notifications/**
          filters:
            - StripPrefix=0
            - JwtAuthFilter

jwt:
  secret: ${JWT_SECRET:libSecretKey2024LibraryAppSecretKey256Bits!}

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    com.library.gateway: DEBUG
