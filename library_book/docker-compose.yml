services:
  # ─── Infrastructure ───────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: library-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongodb_data:/data/db
    networks:
      - library-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: library-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: password
    networks:
      - library-network
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Microservices ────────────────────────────────────────────────────────────
  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: library-user-service
    ports:
      - "8081:8081"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://admin:password@mongodb:27017/library_users?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-libSecretKey2024LibraryAppSecretKey256Bits!}
      SERVER_PORT: 8081
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - library-network
    restart: unless-stopped

  catalog-service:
    build:
      context: ./catalog-service
      dockerfile: Dockerfile
    container_name: library-catalog-service
    ports:
      - "8082:8082"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://admin:password@mongodb:27017/library_catalog?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-libSecretKey2024LibraryAppSecretKey256Bits!}
      SERVER_PORT: 8082
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - library-network
    restart: unless-stopped

  loan-service:
    build:
      context: ./loan-service
      dockerfile: Dockerfile
    container_name: library-loan-service
    ports:
      - "8083:8083"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://admin:password@mongodb:27017/library_loans?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-libSecretKey2024LibraryAppSecretKey256Bits!}
      CATALOG_SERVICE_URL: http://catalog-service:8082
      USER_SERVICE_URL: http://user-service:8081
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USERNAME: admin
      RABBITMQ_PASSWORD: password
      SERVER_PORT: 8083
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      catalog-service:
        condition: service_started
      user-service:
        condition: service_started
    networks:
      - library-network
    restart: unless-stopped

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: library-notification-service
    ports:
      - "8084:8084"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://admin:password@mongodb:27017/library_notifications?authSource=admin
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USERNAME: admin
      RABBITMQ_PASSWORD: password
      USER_SERVICE_URL: http://user-service:8081
      JWT_SECRET: ${JWT_SECRET:-libSecretKey2024LibraryAppSecretKey256Bits!}
      SERVER_PORT: 8084
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      user-service:
        condition: service_started
    networks:
      - library-network
    restart: unless-stopped

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: library-api-gateway
    ports:
      - "8080:8080"
    environment:
      USER_SERVICE_URL: http://user-service:8081
      CATALOG_SERVICE_URL: http://catalog-service:8082
      LOAN_SERVICE_URL: http://loan-service:8083
      NOTIFICATION_SERVICE_URL: http://notification-service:8084
      JWT_SECRET: ${JWT_SECRET:-libSecretKey2024LibraryAppSecretKey256Bits!}
      SERVER_PORT: 8080
    depends_on:
      - user-service
      - catalog-service
      - loan-service
      - notification-service
    networks:
      - library-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: library-frontend
    ports:
      - "3000:80"
    depends_on:
      - api-gateway
    networks:
      - library-network
    restart: unless-stopped

volumes:
  mongodb_data:

networks:
  library-network:
    driver: bridge
